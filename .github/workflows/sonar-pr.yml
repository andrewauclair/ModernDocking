name: SonarCloud Analysis (PR)

on:
  pull_request_target:
    branches: [ main ]

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_PR_KEY: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          SONAR_PR_BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          ./gradlew build sonar \
            -x :demo-common:build \
            -x :demo-single-app:build \
            -x :demo-multi-app:build \
            -Dsonar.pullrequest.key=$SONAR_PR_KEY \
            -Dsonar.pullrequest.branch=$SONAR_PR_BRANCH \
            -Dsonar.pullrequest.base=$SONAR_PR_BASE